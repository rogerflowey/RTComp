import os
import shutil
import sys
import lit.formats

config.name = "RTEffect"
config.test_format = lit.formats.ShTest()
config.suffixes = ['.ll', '.c', '.cpp']
config.excludes = ['cross_lang']
config.test_source_root = os.path.dirname(__file__)
config.test_exec_root = os.path.dirname(__file__)
config.environment['RTEFFECT_EXTERNAL_FUNC_FILE'] = os.environ.get(
    'RTEFFECT_EXTERNAL_FUNC_FILE',
    os.path.join(os.path.dirname(__file__), '..', 'external_funcs.yaml'))

plugin_dir = os.environ.get('RTEFFECT_PLUGIN_DIR',
                             os.path.join(os.path.dirname(__file__), '..', 'build'))
opt = os.environ.get('OPT', shutil.which('opt') or '/usr/bin/opt')
clang = os.environ.get('CLANG', shutil.which('clang') or '/usr/bin/clang')
FileCheck = os.environ.get('FILECHECK',
                           shutil.which('FileCheck') or '/usr/bin/FileCheck')
jq = os.environ.get('JQ', shutil.which('jq') or '/usr/bin/jq')
yaml_table = os.environ.get('RTEFFECT_EXTERNAL_FUNC_FILE',
                             os.path.join(os.path.dirname(__file__), '..', 'external_funcs.yaml'))

config.substitutions.append(('%opt', opt))
config.substitutions.append(('%clang', clang))
config.substitutions.append(('%FileCheck', FileCheck))
config.substitutions.append(('%jq', jq))
config.substitutions.append(('%plugin_dir', plugin_dir))
config.substitutions.append(('%yaml_table', yaml_table))
